<head>
    <title>Clock In</title>
    <link rel="stylesheet" href="index.css" />
</head>

<body>
    <div id="app-container">
        <div id="time-display">00:00:00</div>
        <button name="start-button" onclick="onclickInit()" class="button">Start</button>
        <button name="control-button" onclick="onclickToggle()" class="button" hidden>Pause</button>
        <button name="save-button" onclick="onclickSave()" class="button" hidden>Save & End</button>

        <details>
            <summary>Worktime & Income</summary>
            <div style="display: flex; justify-self: center;">
                <table>
                    <caption>
                        Income per time saved
                    </caption>
                    <thead>
                        <tr>
                            <th scope="col">Start Date</th>
                            <th scope="col">End Date</th>
                            <th scope="col">Time</th>
                            <th scope="col">Income</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                    <tfoot>
                        <tr>
                            <th scope="row" colspan="3">Full Income</th>
                            <td id="fullIncome"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </details>
    </div>
</body>
